<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 28">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="192" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Route mark (fits in 28×28 area) -->
  <!-- Straight diagonal: origin (bottom-left) to pin (top-right) -->
  <line x1="4.5" y1="23" x2="22" y2="8" stroke="#6366f1" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Origin dot -->
  <circle cx="4.5" cy="23" r="3.2" fill="#6366f1"/>
  <!-- Destination pin: head at (22,9), teardrop tip at y=19 -->
  <path d="M22,4 C19,4 16.5,6.5 16.5,9.5 C16.5,14 22,19 22,19 C22,19 27.5,14 27.5,9.5 C27.5,6.5 25,4 22,4 Z"
        fill="#8b5cf6"/>
  <circle cx="22" cy="9.5" r="2.8" fill="white" opacity="0.82"/>
  <!-- Wordmark -->
  <text y="20" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" fill="url(#g)">
    <tspan x="36" font-size="20" font-weight="800" letter-spacing="-0.4">Trek</tspan><tspan font-size="20" font-weight="300" letter-spacing="0.1"> Wanderer</tspan>
  </text>
</svg>
