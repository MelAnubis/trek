services:
  trek:
    image: mauriceboe/trek:latest
    container_name: trek_app
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - TZ=${TZ:-Europe/Madrid}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=https://rodadas.info:446,https://www.rodadas.info:446
      - FORCE_HTTPS=true
      - TRUST_PROXY=1
      - APP_URL=https://rodadas.info:446
      # IBP API key (obtener en https://www.ibpindex.com/index.php/es/ibp-services/ibp-index-api-v2-0)
      # - IBP_API_KEY=tu_clave_ibp_aqui
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - trek_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: trek_nginx
    restart: unless-stopped
    ports:
      - "840:80"
      - "446:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    networks:
      - trek_net
    depends_on:
      trek:
        condition: service_healthy

networks:
  trek_net:
    driver: bridge
