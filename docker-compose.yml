services:
  trek:
    build: .
    container_name: trek_app
    env_file:
      - .env
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - TZ=${TZ:-Europe/Madrid}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=https://trekwanderer.info:446,https://www.trekwanderer.info:446,https://rodadas.info:446,https://www.rodadas.info:446
      - FORCE_HTTPS=true
      - TRUST_PROXY=1
      - APP_URL=https://trekwanderer.info:446
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET}
      - ONEDRIVE_REDIRECT_URI=${ONEDRIVE_REDIRECT_URI}
      # IBP API key (obtener en https://www.ibpindex.com/index.php/es/ibp-services/ibp-index-api-v2-0)
      # - IBP_API_KEY=tu_clave_ibp_aqui
      # Open Elevation — añade altitudes a GPX sin datos de elevación
      # Opción A: servidor propio (recomendado para uso intensivo)
      # - OPEN_ELEVATION_URL=http://open-elevation:8080/api/v1/lookup
      # Opción B: API pública gratuita (opentopodata.org, sin límite estricto)
      # - OPEN_ELEVATION_ENABLED=true
      # IA "Lugares imprescindibles" — configurar UNA clave (en orden de preferencia):
      # 1. Groq — GRATIS: https://console.groq.com (recomendado)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      # 2. Google Gemini — GRATIS: https://aistudio.google.com/apikey
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # 3. Anthropic Claude — de pago: https://console.anthropic.com/settings/keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # ── Bikepack integration ──────────────────────────────────────────────
      # User sync: auto-create new Trek users on the Bikepack instance.
      - BIKEPACK_URL=${BIKEPACK_URL:-}
      - BIKEPACK_ADMIN_EMAIL=${BIKEPACK_ADMIN_EMAIL:-}
      - BIKEPACK_ADMIN_PASSWORD=${BIKEPACK_ADMIN_PASSWORD:-}
      # - BIKEPACK_INSECURE=true   # Uncomment if Bikepack uses a self-signed cert
      # - BIKEPACK_SSO_PATH=/auth/sso-session  # Uncomment if the Bikepack reverse proxy strips /api
      # SSO: same secret on BOTH instances enables transparent cross-login.
      # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - BIKEPACK_SHARED_SECRET=${BIKEPACK_SHARED_SECRET:-}
      # Cookie name for this instance — set to 'bikepack_session' on the Bikepack side
      # so Trek and Bikepack cookies don't collide (they share the same domain).
      - SESSION_COOKIE_NAME=${SESSION_COOKIE_NAME:-trek_session}
    volumes:
      - //c/003Trek/trek-main/data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - trek_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: trek_nginx
    restart: unless-stopped
    ports:
      - "840:80"
      - "446:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/certs:ro
    networks:
      - trek_net
    depends_on:
      trek:
        condition: service_healthy

networks:
  trek_net:
    driver: bridge
